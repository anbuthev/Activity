<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Word Search - Player Arena</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
            --accent-green: #22c55e;
            --accent-blue: #3b82f6;
            --accent-gold: #f59e0b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
            touch-action: manipulation;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1rem;
        }

        .container {
            width: 100%;
            max-width: 480px;
            background: var(--card-bg);
            border-radius: 20px;
            padding: 1.5rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }

        .view-section {
            display: none;
            flex-direction: column;
            gap: 1.25rem;
        }

        .view-section.active {
            display: flex;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 800;
            text-align: center;
            background: linear-gradient(90deg, #3b82f6, #22c55e);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        input[type="text"] {
            width: 100%;
            padding: 1rem;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(0, 0, 0, 0.3);
            color: #fff;
            font-size: 1.1rem;
            outline: none;
            text-align: center;
        }

        .btn {
            width: 100%;
            padding: 1rem;
            border-radius: 12px;
            border: none;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
        }

        .btn-primary { background: var(--accent-blue); color: #fff; }
        .btn-success { background: var(--accent-green); color: #000; }

        .btn:disabled {
            background: #334155;
            color: #64748b;
            cursor: not-allowed;
            opacity: 0.7;
        }

        .turn-card {
            background: rgba(0,0,0,0.3);
            border-radius: 12px;
            padding: 1.25rem;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .status-msg {
            font-size: 0.95rem;
            color: var(--text-muted);
            text-align: center;
            line-height: 1.4;
            min-height: 2.8em;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0.5rem;
            border-radius: 8px;
        }

        .last-score-card {
            display: none;
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid var(--accent-green);
            border-radius: 12px;
            padding: 1rem;
            text-align: center;
        }

        .last-score-card .score-num {
            font-size: 2rem;
            font-weight: 800;
            color: var(--accent-green);
            font-family: 'JetBrains Mono', monospace;
        }

        .hud-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,0.3);
            padding: 0.75rem 1rem;
            border-radius: 12px;
        }

        .hud-item {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .hud-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .hud-value {
            font-size: 1.4rem;
            font-weight: 800;
            font-family: 'JetBrains Mono', monospace;
        }

        #timer { color: var(--accent-gold); }
        #score-display { color: var(--accent-green); }

        #game-grid {
            display: grid;
            gap: 6px;
            user-select: none;
            -webkit-user-select: none;
            margin: 0.5rem 0;
            background: rgba(0, 0, 0, 0.4);
            padding: 0.75rem;
            border-radius: 16px;
        }

        .cell {
            aspect-ratio: 1;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            font-weight: 800;
            color: var(--text-main);
            cursor: pointer;
            transition: background 0.1s ease, transform 0.1s ease;
        }

        .cell.selecting {
            background: var(--accent-blue) !important;
            color: #fff;
            transform: scale(1.08);
        }

        .cell.found {
            background: var(--accent-green) !important;
            color: #000;
            font-weight: 900;
        }

        .word-list {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            justify-content: center;
        }

        .word-chip {
            padding: 0.4rem 0.8rem;
            border-radius: 20px;
            background: rgba(255,255,255,0.08);
            font-size: 0.85rem;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .word-chip.found {
            background: var(--accent-green);
            color: #000;
            text-decoration: line-through;
            opacity: 0.6;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- 1. LOGIN VIEW -->
        <div id="login-view" class="view-section active">
            <h1>Player Login</h1>
            <input type="text" id="player-name-input" placeholder="Enter Your Name..." autocomplete="off">
            <button class="btn btn-primary" id="login-btn">Join Arena</button>
        </div>

        <!-- 2. WAITING ROOM VIEW (HOMEPAGE) -->
        <div id="waiting-view" class="view-section">
            <h1 id="welcome-player">Welcome!</h1>
            
            <!-- LAST ROUND SCORE BANNER -->
            <div class="last-score-card" id="last-score-card">
                <div style="font-size: 0.8rem; color: var(--text-muted); text-transform: uppercase;">Round Finished! Score</div>
                <div class="score-num" id="last-score-num">0 pts</div>
            </div>

            <div class="turn-card">
                <div style="font-size: 0.8rem; color: var(--text-muted); text-transform: uppercase;">Selected On Wheel</div>
                <div id="current-wheel-winner" style="font-size: 1.8rem; font-weight: 800; color: var(--accent-gold);">--</div>
            </div>
            <p class="status-msg" id="turn-status-text">Waiting for Admin to spin the wheel...</p>
            <button class="btn btn-success" id="start-game-btn" disabled>START GAME</button>
        </div>

        <!-- 3. GAME ARENA VIEW -->
        <div id="game-view" class="view-section">
            <div class="hud-bar">
                <div class="hud-item">
                    <span class="hud-label">Time</span>
                    <span class="hud-value" id="timer">60s</span>
                </div>
                <div class="hud-item">
                    <span class="hud-label">Score</span>
                    <span class="hud-value" id="score-display">0</span>
                </div>
            </div>

            <div id="game-grid"></div>
            <div class="word-list" id="word-list-container"></div>
        </div>
    </div>

    <!-- Firebase SDK (v8) -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDHdMf3RMwc9aOG7_fX8dmC_rYNn-Entek",
            authDomain: "funactivity-8b336.firebaseapp.com",
            databaseURL: "https://funactivity-8b336-default-rtdb.firebaseio.com/",
            projectId: "funactivity-8b336",
            storageBucket: "funactivity-8b336.firebasestorage.app",
            messagingSenderId: "20721356946",
            appId: "1:20721356946:web:59b94631e156fbc592964b"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const GRID_SIZE = 8;
        const TARGET_WORDS = ["FIRE", "CODE", "DATA", "NODE", "GRID"];
        let gridMatrix = [];
        
        let playerName = "";
        let wheelWinner = "";
        let isAdminGo = false;
        
        let isDragging = false;
        let startCell = null;
        let currentPath = [];
        let foundIndices = new Set();
        let foundWords = new Set();
        let score = 0;
        let timerInterval = null;

        const loginView = document.getElementById('login-view');
        const waitingView = document.getElementById('waiting-view');
        const gameView = document.getElementById('game-view');
        const playerNameInput = document.getElementById('player-name-input');
        const loginBtn = document.getElementById('login-btn');
        const welcomePlayerEl = document.getElementById('welcome-player');
        const currentWheelWinnerEl = document.getElementById('current-wheel-winner');
        const turnStatusTextEl = document.getElementById('turn-status-text');
        const startGameBtn = document.getElementById('start-game-btn');
        const lastScoreCard = document.getElementById('last-score-card');
        const lastScoreNum = document.getElementById('last-score-num');

        const gridEl = document.getElementById('game-grid');
        const wordListEl = document.getElementById('word-list-container');
        const timerEl = document.getElementById('timer');
        const scoreEl = document.getElementById('score-display');

        loginBtn.addEventListener('click', () => {
            const val = playerNameInput.value.trim();
            if (!val) return alert("Please enter your name!");
            playerName = val;
            welcomePlayerEl.textContent = `Player: ${playerName}`;
            
            loginView.classList.remove('active');
            waitingView.classList.add('active');
            
            listenToFirebaseEvents();
        });

        function listenToFirebaseEvents() {
            db.ref('wheelWinner').on('value', (snapshot) => {
                wheelWinner = snapshot.val() || "";
                currentWheelWinnerEl.textContent = wheelWinner || "--";
                evaluateTurnGating();
            });

            db.ref('gameStarted').on('value', (snapshot) => {
                isAdminGo = !!snapshot.val();
                evaluateTurnGating();
            });
        }

        function evaluateTurnGating() {
            if (!wheelWinner || wheelWinner.trim() === "") {
                turnStatusTextEl.textContent = "Waiting for Admin to spin the wheel...";
                turnStatusTextEl.style.color = "var(--text-muted)";
                startGameBtn.disabled = true;
                return;
            }

            const sanitizedWinner = wheelWinner.trim().toLowerCase();
            const sanitizedPlayer = playerName.trim().toLowerCase();
            const isMyTurn = (sanitizedWinner === sanitizedPlayer);

            if (isMyTurn) {
                if (!isAdminGo) {
                    turnStatusTextEl.textContent = "🎉 You were picked on the wheel! Waiting for Admin GO...";
                    turnStatusTextEl.style.color = "var(--accent-gold)";
                    startGameBtn.disabled = true;
                } else {
                    turnStatusTextEl.textContent = "⚡ Admin pressed GO! Click below to start your turn!";
                    turnStatusTextEl.style.color = "var(--accent-green)";
                    startGameBtn.disabled = false;
                }
            } else {
                turnStatusTextEl.textContent = `🎯 ${wheelWinner} was selected for this round. Stand by!`;
                turnStatusTextEl.style.color = "var(--text-muted)";
                startGameBtn.disabled = true;
            }
        }

        startGameBtn.addEventListener('click', () => {
            // Reset score state for new round
            score = 0;
            scoreEl.textContent = '0';
            foundIndices.clear();
            foundWords.clear();
            lastScoreCard.style.display = 'none';

            waitingView.classList.remove('active');
            gameView.classList.add('active');
            
            generateGridMatrix();
            renderGridUI();
            renderWordListUI();
            
            db.ref('liveGame').set({
                activePlayer: playerName,
                gridLetters: gridMatrix,
                foundIndices: [],
                selectingIndices: [],
                foundWords: [],
                words: TARGET_WORDS,
                foundWordsCount: 0,
                score: 0,
                timeLeft: 60
            });

            startTimer(60);
            attachTouchAndMouseListeners();
        });

        function generateGridMatrix() {
            gridMatrix = Array(GRID_SIZE).fill(null).map(() => Array(GRID_SIZE).fill(''));
            
            const placements = [
                { word: "FIRE", r: 0, c: 0, dr: 0, dc: 1 },
                { word: "CODE", r: 2, c: 1, dr: 1, dc: 0 },
                { word: "DATA", r: 1, c: 5, dr: 1, dc: 0 },
                { word: "NODE", r: 5, c: 2, dr: 0, dc: 1 },
                { word: "GRID", r: 7, c: 3, dr: 0, dc: 1 }
            ];

            placements.forEach(({ word, r, c, dr, dc }) => {
                for (let i = 0; i < word.length; i++) {
                    gridMatrix[r + i * dr][c + i * dc] = word[i];
                }
            });

            const alpha = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
            for (let r = 0; r < GRID_SIZE; r++) {
                for (let c = 0; c < GRID_SIZE; c++) {
                    if (!gridMatrix[r][c]) {
                        gridMatrix[r][c] = alpha[Math.floor(Math.random() * alpha.length)];
                    }
                }
            }
        }

        function renderGridUI() {
            gridEl.innerHTML = '';
            gridEl.style.gridTemplateColumns = `repeat(${GRID_SIZE}, 1fr)`;

            gridMatrix.forEach((row, r) => {
                row.forEach((letter, c) => {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.textContent = letter;
                    cell.dataset.row = r;
                    cell.dataset.col = c;
                    gridEl.appendChild(cell);
                });
            });
        }

        function renderWordListUI() {
            wordListEl.innerHTML = '';
            TARGET_WORDS.forEach(word => {
                const chip = document.createElement('div');
                chip.className = 'word-chip';
                chip.id = `word-${word}`;
                chip.textContent = word;
                wordListEl.appendChild(chip);
            });
        }

        function attachTouchAndMouseListeners() {
            gridEl.addEventListener('mousedown', (e) => {
                const cell = e.target.closest('.cell');
                if (cell) startSelection(parseInt(cell.dataset.row), parseInt(cell.dataset.col));
            });

            gridEl.addEventListener('mousemove', (e) => {
                if (!isDragging) return;
                const cell = e.target.closest('.cell');
                if (cell) updateSelection(parseInt(cell.dataset.row), parseInt(cell.dataset.col));
            });

            window.addEventListener('mouseup', endSelection);

            gridEl.addEventListener('touchstart', (e) => {
                const cell = getCellFromTouch(e);
                if (cell) startSelection(cell.row, cell.col);
            }, { passive: true });

            gridEl.addEventListener('touchmove', (e) => {
                if (!isDragging) return;
                const cell = getCellFromTouch(e);
                if (cell) updateSelection(cell.row, cell.col);
            }, { passive: true });

            window.addEventListener('touchend', endSelection);
        }

        function getCellFromTouch(e) {
            const touch = e.touches[0];
            if (!touch) return null;
            const el = document.elementFromPoint(touch.clientX, touch.clientY);
            if (el && el.classList.contains('cell')) {
                return { row: parseInt(el.dataset.row), col: parseInt(el.dataset.col) };
            }
            return null;
        }

        function startSelection(row, col) {
            isDragging = true;
            startCell = { row, col };
            updateSelection(row, col);
        }

        function updateSelection(targetRow, targetCol) {
            if (!isDragging || !startCell) return;

            const line = getLineCells(startCell.row, startCell.col, targetRow, targetCol);
            
            document.querySelectorAll('.cell.selecting').forEach(c => c.classList.remove('selecting'));

            const pathKeys = [];
            currentPath = [];

            line.forEach(pos => {
                const key = `${pos.row}-${pos.col}`;
                pathKeys.push(key);

                const cellEl = document.querySelector(`.cell[data-row="${pos.row}"][data-col="${pos.col}"]`);
                if (cellEl) {
                    cellEl.classList.add('selecting');
                    currentPath.push({ el: cellEl, letter: cellEl.textContent, key });
                }
            });

            db.ref('liveGame/selectingIndices').set(pathKeys);
        }

        function endSelection() {
            if (!isDragging) return;
            isDragging = false;

            const formedWord = currentPath.map(p => p.letter).join('');
            const reversedWord = formedWord.split('').reverse().join('');

            let matched = null;
            if (TARGET_WORDS.includes(formedWord) && !foundWords.has(formedWord)) {
                matched = formedWord;
            } else if (TARGET_WORDS.includes(reversedWord) && !foundWords.has(reversedWord)) {
                matched = reversedWord;
            }

            if (matched) {
                foundWords.add(matched);
                score += 10;
                scoreEl.textContent = score;

                currentPath.forEach(p => {
                    foundIndices.add(p.key);
                    p.el.classList.add('found');
                });

                const chip = document.getElementById(`word-${matched}`);
                if (chip) chip.classList.add('found');

                db.ref('liveGame/foundIndices').set(Array.from(foundIndices));
                db.ref('liveGame/foundWords').set(Array.from(foundWords));
                db.ref('liveGame/foundWordsCount').set(foundWords.size);
                db.ref('liveGame/score').set(score);
                db.ref(`scores/${playerName}`).set(score);
            }

            document.querySelectorAll('.cell.selecting').forEach(c => c.classList.remove('selecting'));
            db.ref('liveGame/selectingIndices').set([]);

            startCell = null;
            currentPath = [];
        }

        function getLineCells(r1, c1, r2, c2) {
            const dr = r2 - r1;
            const dc = c2 - c1;
            const steps = Math.max(Math.abs(dr), Math.abs(dc));

            if (steps === 0) return [{ row: r1, col: c1 }];

            const stepR = dr === 0 ? 0 : dr / Math.abs(dr);
            const stepC = dc === 0 ? 0 : dc / Math.abs(dc);

            if (Math.abs(dr) !== 0 && Math.abs(dc) !== 0 && Math.abs(dr) !== Math.abs(dc)) {
                return [{ row: r1, col: c1 }];
            }

            const cells = [];
            for (let i = 0; i <= steps; i++) {
                cells.push({ row: r1 + i * stepR, col: c1 + i * stepC });
            }
            return cells;
        }

        function startTimer(seconds) {
            let left = seconds;
            timerEl.textContent = `${left}s`;

            if (timerInterval) clearInterval(timerInterval);

            timerInterval = setInterval(() => {
                left--;
                timerEl.textContent = `${left}s`;
                db.ref('liveGame/timeLeft').set(left);

                // --- 1 MINUTE REDIRECT TO HOMEPAGE & SCORE DISPLAY ---
                if (left <= 0) {
                    clearInterval(timerInterval);
                    
                    // 1. Switch back to Waiting Room (Homepage)
                    gameView.classList.remove('active');
                    waitingView.classList.add('active');

                    // 2. Display Scored Points Banner
                    lastScoreNum.textContent = `${score} pts`;
                    lastScoreCard.style.display = 'block';

                    // 3. Update status message & disable button
                    turnStatusTextEl.textContent = `⏱️ Time's up! You scored ${score} pts. Waiting for next round...`;
                    turnStatusTextEl.style.color = "var(--accent-gold)";
                    startGameBtn.disabled = true;

                    // 4. Update Firebase
                    db.ref('liveGame/timeLeft').set(0);
                }
            }, 1000);
        }
    </script>
</body>
</html>
